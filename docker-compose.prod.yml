services:
  postgres:
    image: postgres:16-alpine
    container_name: cac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cac}
    volumes:
      - cac_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cac} -d ${POSTGRES_DB:-cac}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: cac-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction", "--requirepass", "${REDIS_PASSWORD:-}"]
    volumes:
      - cac_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cac-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8787
      DATABASE_URL: postgresql://${POSTGRES_USER:-cac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cac}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-900}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-30}
      PROJECTS_ROOT: /projects
      CLAUDE_BIN: ${CLAUDE_BIN:-claude}
      RUN_TIMEOUT_MS: ${RUN_TIMEOUT_MS:-1800000}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-3}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      AUTH_ENABLED: true
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ${PROJECTS_ROOT_HOST:?PROJECTS_ROOT_HOST is required}:/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /
    container_name: cac-web
    restart: unless-stopped
    networks:
      - frontend

  nginx:
    image: nginx:1.27-alpine
    container_name: cac-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/${NGINX_CONF:-nginx-nossl.conf}:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    networks:
      - frontend

volumes:
  cac_pg_data:
  cac_redis_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
